# Per-identity DreamBooth-LoRA training config — comparison baseline.
# Trained once per benchmark identity on plain SDXL (no demographic LoRA).

model:
  base: "stabilityai/stable-diffusion-xl-base-1.0"
  vae: "madebyollin/sdxl-vae-fp16-fix"

lora:
  rank: 16
  alpha: 8
  target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"

training:
  # {gender} is filled per identity from its metadata (man/woman), so the class
  # set matches the subject and the instance/class share the same noun.
  instance_prompt: "a photo of sks {gender}"
  class_prompt: "a realistic photo of a {gender}, natural lighting"
  with_prior_preservation: true
  prior_loss_weight: 1.0
  num_class_images: 100            # per gender; a man set and a woman set
  class_inference_steps: 50
  class_negative_prompt: "deformed, distorted, disfigured, mutated, bad anatomy, extra limbs, extra fingers, blurry, low quality, jpeg artifacts, grainy, cartoon, anime, illustration, painting, sketch, 3d render, cgi, monochrome, black and white, multiple faces, multiple people"
  instance_flip: true              # random horizontal flip of the single reference (augmentation)
  max_train_steps: 1000
  train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  lr_scheduler: "constant"
  lr_warmup_steps: 0
  mixed_precision: "bf16"
  gradient_checkpointing: true
  enable_xformers: true
  optimizer: "adamw_8bit"
  seed: 42

output_dir: "models/dreambooth_loras"
