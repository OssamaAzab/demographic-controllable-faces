name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lint and the smoke tests are CPU-only and need no model weights or the
      # external method repos, so we install just the package (no heavy deps are
      # declared) plus ruff, pytest, and pyyaml.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff==0.15.16 pytest pyyaml

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest tests/ -q
